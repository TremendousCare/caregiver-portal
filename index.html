<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tremendous Care — Caregiver Portal</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232E4E8D'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-size='14' font-weight='bold' fill='white'>TC</text></svg>" />
    <link rel="manifest" href="/care-manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <meta name="theme-color" content="#2E4E8D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Tremendous Care" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      /* PWA install identity selector — runs synchronously during head parse.
         The office/admin app and the caregiver app share this one index.html,
         but each needs its own install identity (start_url + name). iOS Safari
         ignores blob: and late JS-injected manifests for "Add to Home Screen",
         so on office routes we point the <link rel="manifest"> at a REAL static
         file (office-manifest.webmanifest, start_url "/") before iOS reads it.
         Caregiver and public-token routes keep the default care manifest above,
         untouched. This handles the initial (parse-time) load; client-side SPA
         navigation between surfaces is re-synced by the route effect in
         src/App.jsx. Reserved prefixes mirror App.jsx and src/pwa/routeScope.js
         — keep all three in sync. */
      (function () {
        var reserved = /^\/(care|bd|apply|upload|sign|survey)(\/|$)/;
        if (reserved.test(window.location.pathname)) return;
        var link = document.querySelector('link[rel="manifest"]');
        if (link) link.href = '/office-manifest.webmanifest';
        var title = document.querySelector('meta[name="apple-mobile-web-app-title"]');
        if (title) title.content = 'TC Office';
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
