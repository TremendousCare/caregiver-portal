name: Deploy Database Migrations

# Manual-only. Triggered from the GitHub Actions tab.
# Runs `supabase db push` against production using secrets stored in the repo.
# Default is a dry run that lists pending migrations without applying them.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list pending migrations without applying them)'
        type: boolean
        default: true

concurrency:
  group: deploy-migrations
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: List pending migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npx supabase migration list --db-url "$SUPABASE_DB_URL"

      - name: Apply migrations
        if: ${{ inputs.dry_run == false }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npx supabase db push --db-url "$SUPABASE_DB_URL"

      - name: Dry run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "::notice::DRY RUN — nothing was applied. Re-run with dry_run=false to apply."
