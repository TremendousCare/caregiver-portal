name: Sync Edge Function from Supabase

# Purpose:
#   Download the source of a deployed Supabase Edge Function and commit
#   it back into this repo. Used to "cure drift" when an edge function
#   was deployed manually (via `supabase functions deploy` from someone's
#   laptop) and its source was never checked in.
#
# Usage:
#   Actions tab → "Sync Edge Function from Supabase" → Run workflow
#   → type the function name (e.g. "sharepoint-docs") → Run.
#
# What happens:
#   1. The workflow runs `npx supabase functions download <name>`
#      against the production project using the existing
#      SUPABASE_ACCESS_TOKEN repo secret.
#   2. Downloaded files land under `supabase/functions/<name>/`.
#   3. `peter-evans/create-pull-request` bundles any new/changed files
#      into a PR on a dedicated branch, titled after the function.
#   4. You review and merge the PR exactly like any other change.
#
# Safety notes:
#   - This workflow never writes to `main` directly. It always opens a
#     PR for human review.
#   - If the downloaded source already matches git, no PR is created.
#   - The workflow only READS from Supabase; it does not deploy.

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Edge function name to sync from Supabase (e.g. sharepoint-docs)'
        type: string
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download edge function source
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          npx supabase functions download "${{ inputs.function_name }}" \
            --project-ref zocrnurvazyxdpyqimgj

      - name: Create pull request with synced source
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-edge-function-${{ inputs.function_name }}
          delete-branch: true
          commit-message: |
            chore(edge-functions): sync ${{ inputs.function_name }} source from Supabase

            Downloaded via `supabase functions download` to cure drift
            between the deployed function and its source in git.
          title: "chore(edge-functions): sync ${{ inputs.function_name }} source from Supabase"
          body: |
            ## Summary

            Automated sync of the deployed `${{ inputs.function_name }}` edge function source.

            This PR was generated by the **Sync Edge Function from Supabase** workflow. The
            function's source is now in git so subsequent changes can be reviewed and
            auto-deployed by the existing `deploy-edge-functions.yml` workflow.

            ## Review checklist

            - [ ] Verify the downloaded source matches what you'd expect the deployed function to look like
            - [ ] No embedded secrets (API keys, passwords) — Supabase should not return these, but double-check
            - [ ] Run any relevant tests
            - [ ] Merge to main

            After merge, future edits to this function go through normal PR flow and the
            deploy-edge-functions workflow redeploys them.
