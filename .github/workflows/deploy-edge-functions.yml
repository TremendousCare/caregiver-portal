name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

concurrency:
  group: deploy-edge-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          deployed=0
          failed=0
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            if [ "$fn" = "_shared" ]; then continue; fi
            echo "::group::Deploying $fn"
            if npx supabase functions deploy "$fn" \
                 --project-ref zocrnurvazyxdpyqimgj \
                 --no-verify-jwt; then
              deployed=$((deployed + 1))
            else
              failed=$((failed + 1))
              echo "::error::Deploy failed for $fn"
            fi
            echo "::endgroup::"
          done
          echo "── Summary ──"
          echo "Deployed: $deployed"
          echo "Failed:   $failed"
          if [ "$failed" -gt 0 ]; then
            exit 1
          fi
